server:
  port: 8081

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: data
  jpa:
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:create-drop}
  datasource:
    url: ${DB_URL:jdbc:h2:mem:testdb}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

pixabay:
  key: ${PIXABAY_KEY}
  url:
    video: ${PIXABAY_VIDEO_URL}
    music: ${PIXABAY_MUSIC_URL}

discord:
  webhook:
    url: ${DISCORD_WEBHOOK_URL}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.services: INFO
