name: ci

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  checks: write
  
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
      with:
        token: ${{ secrets.SUBMODULE_TOKEN }}
        submodules: true

    - name: Cache SonarQube packages
      uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Setup JDK 21
      uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e
      with:
        distribution: 'temurin'
        java-version: '21'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@11d4d83c63a6ce61b32d8a9c4faddbdb04fe9917
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build and analyze
      env:
        PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: ./gradlew build jacocoTestReport sonar --info

    - name: Publish Test Report
      uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386
      if: always()
      with:
        report_paths: "**/build/test-results/test/TEST-*.xml"
