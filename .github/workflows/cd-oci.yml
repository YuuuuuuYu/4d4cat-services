name: cd-oci

on:
  pull_request:
    branches: [ "main" ]
    types: [closed]
    paths:
      - 'core/**'
      - 'api/**'
      - '.github/workflows/cd-oci.yml'

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout sources
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          token: ${{ secrets.SUBMODULE_TOKEN }}
          submodules: true

      - name: Setup JDK 21
        uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@11d4d83c63a6ce61b32d8a9c4faddbdb04fe9917

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build api with Gradle
        env:
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
        run: ./gradlew :api:bootJar

      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build and push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/4d4cat-api:${{ github.sha }}
            ${{ secrets.DOCKER_HUB_USERNAME }}/4d4cat-api:latest

      - name: (SSH) Deploy to Main Oracle Instance
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.ORACLE_MAIN_IP }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_KEY }}
          script: |
            # Pull the specific version of the image using the commit SHA
            sudo docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/4d4cat-api:${{ github.sha }}

            # Stop and remove the old container
            sudo docker stop 4d4cat-api || true
            sudo docker rm 4d4cat-api || true

            # Run the new container with environment variables from server
            sudo docker run -d \
              --name 4d4cat-api \
              -p 8080:8080 \
              --env-file /home/opc/.env \
              -e TZ=Asia/Seoul \
              -v /home/opc/logs:/app/logs \
              ${{ secrets.DOCKER_HUB_USERNAME }}/4d4cat-api:${{ github.sha }}

            # Health check - wait for Spring Boot to be healthy
            echo "Waiting for container to start and be healthy..."
            for i in {1..30}; do
              if curl -s -f http://localhost:8080/actuator/health | grep -q "UP"; then
                echo "Main container is healthy and running!"
                break
              fi
              echo "Waiting for application startup (attempt $i/30)..."
              sleep 2
              if [ $i -eq 30 ]; then
                echo "Health check failed for Main instance!"
                sudo docker logs 4d4cat-api
                exit 1
              fi
            done

            # Clean up unused images to save disk space
            sudo docker image prune -f

      - name: (SSH) Deploy to Sub Oracle Instance
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.ORACLE_SUB_IP }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_KEY }}
          script: |
            # Pull the specific version of the image using the commit SHA
            sudo docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/4d4cat-api:${{ github.sha }}

            # Stop and remove the old container
            sudo docker stop 4d4cat-api || true
            sudo docker rm 4d4cat-api || true

            # Run the new container with environment variables from server
            sudo docker run -d \
              --name 4d4cat-api \
              -p 8080:8080 \
              --env-file /home/opc/.env \
              -e TZ=Asia/Seoul \
              -v /home/opc/logs:/app/logs \
              ${{ secrets.DOCKER_HUB_USERNAME }}/4d4cat-api:${{ github.sha }}

            # Health check - wait for Spring Boot to be healthy
            echo "Waiting for container to start and be healthy..."
            for i in {1..30}; do
              if curl -s -f http://localhost:8080/actuator/health | grep -q "UP"; then
                echo "Sub container is healthy and running!"
                break
              fi
              echo "Waiting for application startup (attempt $i/30)..."
              sleep 2
              if [ $i -eq 30 ]; then
                echo "Health check failed for Sub instance!"
                sudo docker logs 4d4cat-api
                exit 1
              fi
            done

            # Clean up unused images to save disk space
            sudo docker image prune -f
