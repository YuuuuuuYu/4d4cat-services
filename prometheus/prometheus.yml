global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api:8080']

  - job_name: 'data-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['data:8081']

  - job_name: 'monitoring-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['monitoring:8080']
